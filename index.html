<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex Engine | Hub</title>
    <link rel="icon" type="image/png" href="Vertex.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="user-bar">
        <div class="left-section">
            <div class="logo" onclick="showHub()" style="cursor:pointer"><img src="Vertex.png" alt="Vertex"></div>
            <div class="project-controls">
                <button class="icon-btn" onclick="startCreating()">+</button>
                <input type="text" id="project-name" value="Untitled Project">
                <button id="share-btn" class="share-btn" onclick="shareProject()" style="display:none;">Share</button>
            </div>
        </div>
        <div id="auth-section">
            <button onclick="openModal('signin-modal')">Sign In</button>
            <button class="primary" onclick="openModal('signup-modal')">Join Vertex</button>
        </div>
    </header>

    <div id="vertex-hub">
        <div id="owner-panel">
            <div id="admin-stats"></div>
        </div>

        <section class="banner">
            <h1>Vertex Hub</h1>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search for a player...">
                <button onclick="searchPlayer()">Search</button>
            </div>
        </section>

        <section class="hub-grid">
            <div class="hub-column">
                <h2 class="featured-text">⭐ Featured (500+ Likes)</h2>
                <div id="featured-list"></div>
            </div>
            <div class="hub-column">
                <h2>Community Projects</h2>
                <div id="community-list"></div>
            </div>
        </section>
    </div>

    <div id="app" style="display: none;">
        <div id="toolbar">
            <h3 style="color:#4c97ff">Motion</h3>
            <button class="block" onclick="moveSprite(10)">Move 10 Steps</button>
            <button class="block" onclick="rotateSprite(15)">Turn 15°</button>
            <button class="block reset" onclick="showHub()">Back to Hub</button>
        </div>
        <div id="stage-container"><canvas id="stage"></canvas></div>
    </div>

    <div id="signin-modal" class="modal"><div class="modal-content"><h2>Sign In</h2><input type="text" id="login-user" placeholder="User"><input type="password" id="login-pass" placeholder="Pass"><button class="submit-btn" onclick="handleSignIn()">Login</button></div></div>
    <div id="signup-modal" class="modal"><div class="modal-content"><h2>Join</h2><input type="text" id="reg-user" placeholder="User"><input type="password" id="reg-pass" placeholder="Pass"><button class="submit-btn" onclick="handleSignUp()">Create</button></div></div>
    <div id="profile-modal" class="modal"><div class="modal-content"><h2 id="profile-name"></h2><p id="profile-date"></p></div></div>

    <script src="script.js"></script>
</body>
</html>
