<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex Engine</title>
    <link rel="icon" type="image/png" href="Vertex.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="user-bar">
        <div class="left-section">
            <div class="logo" onclick="showHub()" style="cursor:pointer">
                <img src="Vertex.png" alt="Vertex Logo">
            </div>
            <div class="project-controls">
                <button class="icon-btn" onclick="startCreating()" title="Create New">+</button>
                <input type="text" id="project-name" value="Untitled Project">
                <button id="share-btn" class="share-btn" onclick="shareProject()" style="display:none;">Share to Hub</button>
            </div>
        </div>
        
        <div id="auth-section" class="auth-buttons">
            <button onclick="openModal('signin-modal')">Sign In</button>
            <button class="primary" onclick="openModal('signup-modal')">Join Vertex</button>
        </div>
    </header>

    <div id="vertex-hub">
        <section class="banner">
            <h1>Vertex Hub</h1>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search for a player...">
                <button onclick="searchPlayer()">Search</button>
            </div>
        </section>

        <section class="hub-grid">
            <div class="hub-column">
                <h2 class="featured-text">⭐ Featured (500+ Likes)</h2>
                <div id="featured-list" class="card-container"></div>
            </div>
            <div class="hub-column">
                <h2>Recent Community Projects</h2>
                <div id="community-list" class="card-container"></div>
            </div>
        </section>

        <footer>
            <button class="rules-btn" onclick="openModal('rules-modal')">Vertex Rules</button>
        </footer>
    </div>

    <div id="app" style="display: none;">
        <div id="toolbar">
            <div class="category">
                <h3 class="motion-text">Motion</h3>
                <button class="block motion" onclick="moveSprite(10)">Move 10 Steps</button>
                <button class="block motion" onclick="rotateSprite(15)">Turn 15 Deg</button>
            </div>
            <button class="block reset" onclick="resetSprite()">Reset Stage</button>
        </div>
        <div id="stage-container">
            <canvas id="stage"></canvas>
        </div>
    </div>

    <div id="signin-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('signin-modal')">&times;</span>
            <h2>Sign In</h2>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="submit-btn" onclick="handleSignIn()">Login</button>
        </div>
    </div>

    <div id="signup-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('signup-modal')">&times;</span>
            <h2>Join Vertex</h2>
            <input type="text" id="reg-user" placeholder="Username">
            <input type="password" id="reg-pass" placeholder="Create Password">
            <button class="submit-btn" onclick="handleSignUp()">Create Account</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('profile-modal')">&times;</span>
            <h2 id="profile-name">User Profile</h2>
            <p id="profile-date">Joined: --</p>
        </div>
    </div>

    <div id="rules-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('rules-modal')">&times;</span>
            <h2>Vertex Rules</h2>
            <p>1. Real people only—no fake likes.<br>2. Be respectful.<br>3. Keep it coding-focused!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
